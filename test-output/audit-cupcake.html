<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit - cupcake</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  </head>
  <body>
    <div class="navbar bg-base-100 shadow-sm">
      <div class="navbar-start">
        <button class="btn btn-ghost text-xl">DaisyPug
        </button>
      </div>
      <div class="navbar-end">
        <input class="theme-controller btn" type="radio" value="light" name="theme-radios" aria-label="light"/>
        <input class="theme-controller btn" type="radio" value="dark" name="theme-radios" aria-label="dark"/>
        <input class="theme-controller btn" type="radio" value="cupcake" name="theme-radios" aria-label="cupcake"/>
      </div>
    </div>
    <div class="hero py-12 bg-base-200">
      <div class="hero-content text-center">
        <h1 class="text-4xl font-bold">Component Showcase</h1>
        <p class="py-4">Testing theme compliance</p>
      </div>
    </div>
    <div class="divider">Buttons
    </div>
    <div class="flex gap-2 p-4">
      <button class="btn btn-primary">Primary
      </button>
      <button class="btn btn-secondary">Secondary
      </button>
      <button class="btn btn-accent">Accent
      </button>
      <button class="btn btn-info btn-outline">Info Outline
      </button>
    </div>
    <div class="divider">Badges
    </div>
    <div class="flex gap-2 p-4"><span class="badge badge-info">Info</span><span class="badge badge-success badge-outline">Success</span><span class="badge badge-warning badge-soft">Warning</span><span class="badge badge-error">Error</span>
    </div>
    <div class="divider">Form
    </div>
    <div class="p-4 flex flex-col gap-2 max-w-md">
      <input class="input input-primary" type="text" placeholder="Email"/>
      <textarea class="textarea textarea-secondary" placeholder="Message"></textarea>
      <select class="select select-accent">
        <option disabled="disabled" selected="selected">Pick one</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
      </select>
      <div class="flex gap-2">
        <input class="toggle toggle-primary" type="checkbox"/>
        <input class="checkbox checkbox-secondary" type="checkbox"/>
        <input class="radio radio-accent" type="radio" name="test"/>
      </div>
    </div>
    <div class="divider">Card
    </div>
    <div class="card card-border w-96 mx-auto">
      <div class="card-body">
        <h2 class="card-title">Theme Test
        </h2>
        <p>All colors should adapt to the active theme</p>
        <div class="card-actions justify-end">
          <button class="btn btn-primary">Action
          </button>
        </div>
      </div>
    </div>
    <div class="divider">Alert
    </div>
    <div class="flex flex-col gap-2 p-4">
      <div class="alert alert-info" role="alert"><span>Info alert</span>
      </div>
      <div class="alert alert-success" role="alert"><span>Success alert</span>
      </div>
      <div class="alert alert-warning" role="alert"><span>Warning alert</span>
      </div>
      <div class="alert alert-error" role="alert"><span>Error alert</span>
      </div>
    </div>
    <div class="divider">Stats
    </div>
    <div class="stats shadow w-full">
      <div class="stat">
        <div class="stat-title">Downloads
        </div>
        <div class="stat-value">31K
        </div>
        <div class="stat-desc">Jan - Feb
        </div>
      </div>
      <div class="stat">
        <div class="stat-title">Users
        </div>
        <div class="stat-value">4,200
        </div>
        <div class="stat-desc">+12%
        </div>
      </div>
    </div>
    <div class="divider">Progress
    </div>
    <div class="flex flex-col gap-2 p-4">
      <progress class="progress progress-primary" value="70" max="100"></progress>
      <div class="radial-progress text-primary" style="--value:70" role="progressbar">70%
      </div><span class="loading loading-spinner loading-lg"></span>
    </div>
    <footer class="footer footer-center p-4 bg-base-300 text-base-content">
      <p>DaisyPug Theme Audit</p>
    </footer>
  </body>
</html>
