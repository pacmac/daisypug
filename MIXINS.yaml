# DaisyPug Mixin Reference
# Use this instead of raw DaisyUI HTML classes.
# Every DaisyUI class has a corresponding mixin.

# ============================================================
# DUI-Evolved Components (dp- prefix)
# ============================================================

dp-vsplit:
  replaces: "CSS grid side-by-side layout"
  mixin: "+dp-vsplit(size)"
  args: "size: CSS width for first panel ('400px', '30%', '1fr')"
  children: "+dp-panel"
  help: dp-vsplit.md
  example: |
    +dp-vsplit('300px')
      +dp-panel('west', {title: 'Sidebar'})
        //- content
      +dp-panel('center')
        //- content

dp-hsplit:
  replaces: "CSS grid stacked layout"
  mixin: "+dp-hsplit(size)"
  args: "size: CSS height for first panel ('200px', '50%')"
  children: "+dp-panel"
  help: dp-vsplit.md
  example: |
    +dp-hsplit('200px')
      +dp-panel('north', {title: 'Top'})
      +dp-panel('center')

dp-panel:
  replaces: "div with bg, border, scroll"
  mixin: "+dp-panel(name, opts)"
  args: "name: west|east|north|south|center; opts: {title, iconCls, scroll, id, class}"
  help: dp-vsplit.md#usage
  help-api: dp-vsplit.md#api-dpjs
  help-styling: dp-vsplit.md#styling-rules
  api: "DpPanel: header, body, getTitle(), setTitle(), open(), close(), clear(), refresh(url)"

dp-toolbar:
  replaces: "div.flex with buttons"
  mixin: "+dp-toolbar(opts)"
  args: "{title, icon, asdpx, size, id, class}"
  asdpx: "a=Add, s=Save, e=Edit, d=Delete, p=Print, x=Cancel"
  children: "+dp-toolbar-sep, +btn"
  help: dp-toolbar.md#usage
  help-asdpx: dp-toolbar.md#asdpx-characters
  help-api: dp-toolbar.md#api
  example: |
    +dp-toolbar({title: 'Parts', icon: 'box', asdpx: 'aed'})
      +dp-toolbar-sep
      +btn({size: 'xs', style: 'ghost'})
        +dp-icon('download', {size: 'sm'})
        |  Export

dp-form:
  replaces: "form element"
  mixin: "+dp-form(opts)"
  args: "{id, class}"
  classes: ".two .three .four for column grid"
  help: dp-fitem.md#multi-column-forms
  notes: "Duplicate id auto-detected → renders data-form-part for multi-tab forms"
  example: "+dp-form({id: 'head'}).two"

dp-fitem:
  replaces: "label + input pair"
  mixin: "+dp-fitem(label, input, fitemOpts)"
  args: "label: string; input: {class, name, id, color, pre, post, ...}"
  auto-detect:
    textbox: "<input type=text>"
    combobox: "div.dp-combobox (custom dropdown)"
    numberbox: "<input type=number>"
    numberspinner: "<input type=number> with step"
    datebox: "<input type=date>"
    datetimebox: "<input type=datetime-local>"
    timespinner: "<input type=time>"
    multiline: "<textarea>"
    checkbox: "<input type=checkbox>"
    toggle: "<input type=checkbox class=toggle>"
    radio: "<input type=radio>"
    searchbox: "<input type=search>"
    passwordbox: "<input type=password>"
    filebox: "<input type=file>"
  id-shortcut: "id: '~' → auto-generates from name"
  pre-post: "pre/post: icon name string or {action, icon, id, text}"
  help: dp-fitem.md#usage
  help-autodetect: dp-fitem.md#auto-detect-mapping
  help-prepost: dp-fitem.md#prepost-slots
  help-api: dp-fitem.md#api-dpjs
  api: "DpFitem: getValue(), setValue(), getLabel(), onPreClick(), onPostClick(), setPreIcon(), setPostIcon()"
  example: |
    +dp-fitem('Part ID', {class: 'combobox', name: 'PART_ID', id: '~', pre: 'package', options: [...]})
    +dp-fitem('Price', {class: 'numberbox', name: 'PRICE', id: '~', precision: 2, pre: 'dollar-sign'})
    +dp-fitem('Search', {class: 'searchbox', name: 'Q', pre: 'search', post: 'x'})

dp-group:
  replaces: "fieldset / section heading"
  mixin: "+dp-group(title)"
  alias: "+dp-vgroup(title)"
  help: dp-fitem.md

dp-hgroup:
  replaces: "side-by-side fields"
  mixin: "+dp-hgroup(title)"
  help: dp-fitem.md

dp-heading:
  replaces: "h1, h2, h3, h4, h5, h6 with classes"
  mixin: "+dp-heading(text, opts)"
  args: "text: string; opts: {level: 1-6, icon: Lucide name, size: Tailwind text size, class}"
  defaults: "level=2, size auto-mapped: h1=text-2xl, h2=text-lg, h3=text-base, h4-6=text-sm/xs"
  help: dp-heading.md#usage
  help-sizes: dp-heading.md#default-sizes
  example: |
    +dp-heading('Parts Master', {level: 1, icon: 'package'})
    +dp-heading('Details', {level: 2})
    +dp-heading('Section', {level: 3, icon: 'info'})

dp-popup:
  replaces: "externally triggered dropdown/popup menu"
  mixin: "+dp-popup(opts)"
  args: "{position: top|bottom, class, menuClass, items: [{text, icon, page, href}]}"
  note: "Use instead of +dropdown when triggered from an external button (e.g. dock More button)"
  help: dp-popup.md#usage
  help-api: dp-popup.md#api
  api: "DpPopup: open(anchor), close(), toggle(anchor), isOpen(), getItems(), addItem(opts), removeItem(n), onItemClick(fn), onOpen(fn), onClose(fn)"
  example: |
    +dp-popup({position: 'top'})(id="more-menu")
      ul.menu.bg-base-200.rounded-box.shadow-lg.w-52
        +dropdown-item({text: 'Settings', icon: 'settings', page: 'settings'})
        +dropdown-item({text: 'Help', icon: 'help-circle', page: 'help'})
    // JS: dp('#more-menu').open('#more-btn') or dp('#more-menu').toggle('#dock-more')

grid:
  replaces: "div.grid.grid-cols-N.gap-N"
  mixin: "+grid(opts)"
  args: "{cols: 1-12, gap: 0-8, class}"
  help: grid.md
  example: |
    +grid({cols: 3, gap: 2})
      +btn({text: '1'})
      +btn({text: '2'})
      +btn({text: '3'})

dp-viewport:
  replaces: "container, max-width wrapper"
  mixin: "+dp-viewport(opts)"
  args: "{width: '860px', padding: '1em'}"
  help: dp-viewport.md
  example: |
    +dp-viewport
      h1 My App
    +dp-viewport({width: '1024px', padding: '2em'})
      h1 Wider App

dp-icon:
  replaces: "i.bi.bi-*, svg icons"
  mixin: "+dp-icon(name, opts)"
  args: "name: Lucide icon name; opts: {size: xs|sm|md|lg|xl, color, class}"
  sizes: "xs=14px, sm=16px, md=20px, lg=24px, xl=32px"
  help: dp-icon.md#usage
  help-sizes: dp-icon.md#options
  example: "+dp-icon('search', {size: 'sm', color: 'primary'})"

dp-formfield:
  replaces: "label + input (legacy)"
  mixin: "+dp-formfield(label, inputOpts, labelOpts)"
  note: "Use +dp-fitem instead for new code"
  help: dp-formfield.md

dp-formcard:
  replaces: "card with form"
  mixin: "+dp-formcard(title, opts, fields, actions)"
  help: dp-formcard.md

dp-nav:
  replaces: "navbar with menu + theme switcher"
  mixin: "+dp-nav(brand, opts)"
  args: "{items, actions, themes, activeTheme, class}"
  help: dp-nav.md

dp-datatable:
  replaces: "table with pagination, datagrid"
  mixin: "+dp-datatable(opts)"
  args: "{headers, rows, zebra, size, autoWidth, pagination}"
  help: dp-datatable.md#usage
  help-columns: dp-datatable.md#columns
  help-editor: dp-datatable.md#editor
  help-grouping: dp-datatable.md#grouping
  help-pagination: dp-datatable.md#pagination
  help-parsers: dp-datatable.md#response-format-adapters
  api: |
    DpDataTable: columns([{field,title,width,hidden,align,formatter,style,cellClass,headerClass}]),
    idField(field), selectRecord(id), rowStyler(fn), showColumn(field), hideColumn(field),
    setData(rows), getData(), getRow(n), getRows(), addRow(obj), removeRow(n), updateRow(n,obj),
    getCell(row,field), setCell(row,field,val), sort(field,dir), filter(fn), search(q),
    groupBy(fn), groupByCol(field), selectRow(n), deselectRow(), getSelectedRow(),
    paginate(opts), nextPage(), prevPage(), loadData(url,opts), toCSV(), toJSON(),
    onRowClick(fn), onRowDblClick(fn), onCellClick(fn), onRowSelect(fn), onDataChange(fn)

dp-conversation:
  replaces: "chat bubbles"
  mixin: "+dp-conversation(messages)"
  help: dp-conversation.md

dp-modalform:
  replaces: "modal with form"
  mixin: "+dp-modalform(id, title, opts, fields, actions)"
  help: dp-modalform.md

dp-herocta:
  replaces: "hero section with CTA"
  mixin: "+dp-herocta(opts)"
  help: dp-herocta.md

dp-pagelayout:
  replaces: "drawer + navbar + sidebar + content"
  mixin: "+dp-pagelayout(opts)"
  help: dp-pagelayout.md

# ============================================================
# Base DaisyUI Components
# ============================================================

btn:
  replaces: "button.btn"
  mixin: "+btn(opts)"
  args: "{text, color, size, style, shape, wide, block, active, disabled, class}"
  colors: "neutral, primary, secondary, accent, info, success, warning, error"
  sizes: "xs, sm, md, lg, xl"
  styles: "outline, dash, soft, ghost, link"
  help: btn.md#usage
  help-api: btn.md#api
  api: "DpButton: onClick(fn), enable(), disable(), show(), hide(), addClass(), removeClass()"
  example: "+btn({text: 'Click', color: 'primary', size: 'lg'})"

badge:
  replaces: "span.badge"
  mixin: "+badge(opts)"
  args: "{text, color, size, style, class}"
  help: badge.md#usage
  help-api: badge.md#api-dpjs
  api: "DpBadge: getText(), setText(str), getColor(), setColor(color), getStyle(), setStyle(style), setIcon(name), removeIcon(), onClick(fn)"
  example: |
    +badge({color: 'success', text: 'Online'})(id="status-badge")
    // JS: dp('#status-badge').setText('Offline').setColor('error').setIcon('wifi-off')

card:
  replaces: "div.card"
  mixin: "+card(opts)"
  args: "{size, style, side, imageFull, class}"
  children: "+card-body, +card-title, +card-actions"
  help: card.md#usage
  help-api: card.md#api
  api: "DpCard: .body, .title, .actions (sub-elements), getTitle(), setTitle(str)"
  example: |
    +card({style: 'border'})
      +card-body
        +card-title({text: 'Title'})
        p Content
        +card-actions({class: 'justify-end'})
          +btn({color: 'primary', text: 'Action'})

navbar:
  replaces: "div.navbar"
  mixin: "+navbar(opts)"
  children: "+navbar-start, +navbar-center, +navbar-end"
  help: navbar.md#usage
  api: "DpNavbar: .start, .center, .end (sub-elements)"

tabs:
  replaces: "div.tabs"
  mixin: "+tabs(opts)"
  args: "{style: box|border|lift, size, placement, class}"
  children: "+tab({name, label, active}) → +tab-content"
  help: tabs.md#usage
  help-api: tabs.md#api
  api: "DpTabs: getActive(), setActive(n), getTabCount(), getTabLabels(), getActiveLabel(), onTabChange(fn)"
  note: "Do NOT add tab-active class — use checked attribute only"
  example: |
    +tabs({style: 'lift'})
      +tab({name: 'my-tabs', label: 'Tab 1', active: true})
      +tab-content({class: 'p-4'})
        p Content 1
      +tab({name: 'my-tabs', label: 'Tab 2'})
      +tab-content({class: 'p-4'})
        p Content 2

modal:
  replaces: "dialog.modal"
  mixin: "+modal(opts)"
  args: "{id, position, open, backdrop, class}"
  children: "+modal-box, +modal-action"
  trigger: "onclick=\"modal_id.showModal()\""
  help: modal.md#usage
  help-api: modal.md#api
  api: "DpModal: open(), close(), isOpen(), .box, .actions, onOpen(fn), onClose(fn)"

table:
  replaces: "table.table"
  mixin: "+table(opts)"
  args: "{headers, rows, zebra, size, autoWidth, pinRows, pinCols, class}"
  note: "autoWidth=true by default — columns fit content, spacer column at end"
  help: table.md#usage
  grouping: |
    table.groupBy(row => row[0].substring(0,10), key => new Date(key).toLocaleDateString())
    table.groupByCol(0)         // group by first column value
    table.groupBy(null)         // clear grouping
  help-api: table.md#api
  api: "DpTable: getData(), setData(), addRow(), removeRow(), getRow(), selectRow(), sort(), filter(), search(), toCSV(), toJSON(), onRowClick(fn), onCellClick(fn)"

alert:
  replaces: "div.alert"
  mixin: "+alert(opts)"
  args: "{color, style, direction, text, class}"
  help: alert.md#usage
  help-api: alert.md#api
  api: "DpAlert: getMessage(), setMessage(str), getColor(), setColor(color), dismiss(), onDismiss(fn)"

menu:
  replaces: "ul.menu"
  mixin: "+menu(opts)"
  args: "{size, direction, class}"
  children: "+menu-title, +menu-item, +menu-dropdown"
  help: menu.md#usage
  help-api: menu.md#api
  api: "DpMenu: getItems(), getActive(), setActive(n), getActiveIndex(), onSelect(fn)"

dock:
  replaces: "div.dock"
  mixin: "+dock(opts)"
  args: "{size, items: [{name, text, icon, active}], class}"
  children: "+dock-item({name, text, icon, active})"
  help: dock.md#usage
  help-api: dock.md#api-dpjs
  api: "DpDock: onSelect(), setActive(), setActiveByPanel(), getLabels()"

drawer:
  replaces: "div.drawer"
  mixin: "+drawer(opts)"
  args: "{id, end, class}"
  children: "+drawer-content, +drawer-side({for}), +drawer-button"
  help: drawer.md#usage
  help-api: drawer.md#api
  api: "DpDrawer: open(), close(), toggle(), isOpen(), .content, .side, onOpen(fn), onClose(fn)"

collapse:
  replaces: "div.collapse"
  mixin: "+collapse(opts) or +collapse-checkbox(opts)"
  children: "+collapse-title, +collapse-content"
  help: collapse.md#usage
  help-api: collapse.md#api
  api: "DpCollapse: open(), close(), toggle(), isOpen(), .title, .content, onToggle(fn)"

dropdown:
  replaces: "details.dropdown"
  mixin: "+dropdown(opts)"
  args: "{position: top|bottom|left|right, end, hover, open, class}"
  children: "+dropdown-trigger, +dropdown-content, +dropdown-item"
  help: dropdown.md#usage
  help-items: dropdown.md#item-options
  help-api: dropdown.md#api-dpjs
  api: "DpDropdown: open(), close(), toggle(), .trigger, .content, getItems(), addItem(opts), removeItem(n), clearItems(), onItemClick(fn)"
  example: |
    +dropdown({position: 'top', end: true})
      +dropdown-trigger({text: 'More', class: 'btn btn-sm'})
      +dropdown-content({class: 'menu bg-base-200 rounded-box shadow-lg w-52'})
        +dropdown-item({text: 'Settings', icon: 'settings', page: 'settings'})
        +dropdown-item({text: 'Help', icon: 'help-circle', page: 'help'})
        +dropdown-item({text: 'Logout', icon: 'log-out', href: '/logout'})

tooltip:
  replaces: "div.tooltip"
  mixin: "+tooltip(opts)"
  args: "{tip, color, position, class}"
  help: tooltip.md#usage
  api: "DpTooltip: getTip(), setTip(str)"

stats:
  replaces: "div.stats"
  mixin: "+stats(opts)"
  children: "+stat → +stat-title, +stat-value, +stat-desc, +stat-figure, +stat-actions"
  help: stat.md

steps:
  replaces: "ul.steps"
  mixin: "+steps(opts)"
  children: "+step({color, text, icon})"
  help: steps.md#usage
  help-api: steps.md#api
  api: "DpSteps: getActive(), setActive(n, color), next(), prev(), reset(), getStepCount(), onStepChange(fn)"

timeline:
  replaces: "ul.timeline"
  mixin: "+timeline(opts)"
  children: "+timeline-item → +timeline-start, +timeline-middle, +timeline-end, +timeline-hr"
  help: timeline.md

hero:
  replaces: "div.hero"
  mixin: "+hero(opts)"
  children: "+hero-content, +hero-overlay"
  help: hero.md

fieldset:
  replaces: "fieldset.fieldset"
  mixin: "+fieldset(opts)"
  children: "+fieldset-legend, +fieldset-label"
  help: fieldset.md

divider:
  replaces: "div.divider"
  mixin: "+divider(opts)"
  args: "{text, color, direction, position, class}"
  help: divider.md

swap:
  replaces: "label.swap"
  mixin: "+swap(opts)"
  children: "+swap-on, +swap-off"
  help: swap.md#usage
  api: "DpSwap: open(), close(), toggle(), isOpen(), .on, .off"

join:
  replaces: "div.join"
  mixin: "+join(opts)"
  children: "+join-item"
  help: join.md

list:
  replaces: "ul.list"
  mixin: "+list(opts)"
  children: "+list-row"
  help: list.md#usage
  api: "DpList: getItems(), getItemCount(), addItem(html), removeItem(n), getItem(n), clear(), onItemClick(fn)"

chat:
  replaces: "div.chat"
  mixin: "+chat(opts)"
  children: "+chat-image, +chat-header, +chat-bubble, +chat-footer"
  help: chat.md

footer:
  replaces: "footer.footer"
  mixin: "+footer(opts)"
  children: "+footer-title"
  help: footer.md

breadcrumbs:
  replaces: "div.breadcrumbs"
  mixin: "+breadcrumbs(opts)"
  args: "{items: [{text, href}]}"
  help: breadcrumbs.md

rating:
  replaces: "div.rating"
  mixin: "+rating(opts)"
  args: "{name, stars, value, size, half, color}"
  help: rating.md#usage
  api: "DpRating: getValue(), setValue(n), getMax(), onChange(fn)"

toast:
  replaces: "div.toast"
  mixin: "+toast(opts)"
  args: "{position: 'end bottom'}"
  help: toast.md

indicator:
  replaces: "div.indicator"
  mixin: "+indicator(opts)"
  children: "+indicator-item"
  help: indicator.md

stack:
  replaces: "div.stack"
  mixin: "+stack(opts)"
  help: stack.md

diff:
  replaces: "div.diff"
  mixin: "+diff(opts)"
  children: "+diff-item-1, +diff-item-2"
  help: diff.md

carousel:
  replaces: "div.carousel"
  mixin: "+carousel(opts)"
  children: "+carousel-item"
  help: carousel.md#usage
  api: "DpCarousel: getActive(), setActive(n), next(), prev(), getSlideCount(), onSlideChange(fn)"

# ============================================================
# Form Inputs (used inside +dp-fitem or standalone)
# ============================================================

input:
  replaces: "input.input"
  mixin: "+input(opts)"
  args: "{color, size, style, placeholder, name, value, type, class}"
  help: input.md

select:
  replaces: "select.select"
  mixin: "+select(opts)"
  args: "{color, size, style, placeholder, options, name, class}"
  help: select.md
  api-combobox: |
    DpCombobox (class dp-combobox, extends DpComponent):
    Shell: div.dp-combobox > input.dp-cb-display + div.dp-cb-selected + input[hidden] + button.dp-cb-toggle + ul.dp-cb-dropdown
    loadData(arr), load(url, opts), reload(url?), getData(), getRec(value?),
    exists(value), getValue(), setValue(val), getText(), setText(), clear(),
    open(), close(), toggleDropdown(), isOpen(),
    config({valueField, textField, url, queryParams, loadFilter, editable, mode, delay, pageSize, formatter, displayFormatter, filter}),
    onSelect(fn), onLoadSuccess(fn), onLoadError(fn)
    Features: type-to-search, lazy scroll loading, keyboard nav, formatter, displayFormatter (rich selected display)

textarea:
  replaces: "textarea.textarea"
  mixin: "+textarea(opts)"
  args: "{color, size, style, placeholder, name, rows, class}"
  help: textarea.md

checkbox:
  replaces: "input.checkbox"
  mixin: "+checkbox(opts)"
  args: "{color, size, checked, name, class}"
  help: checkbox.md

toggle:
  replaces: "input.toggle"
  mixin: "+toggle(opts)"
  args: "{color, size, checked, name, class}"
  help: toggle.md

radio:
  replaces: "input.radio"
  mixin: "+radio(opts)"
  args: "{color, size, name, value, checked, class}"
  help: radio.md

range:
  replaces: "input.range"
  mixin: "+range(opts)"
  args: "{color, size, min, max, value, step, class}"
  help: range.md

file-input:
  replaces: "input.file-input"
  mixin: "+file-input(opts)"
  args: "{color, size, style, name, accept, class}"
  help: file-input.md

progress:
  replaces: "progress.progress"
  mixin: "+progress(opts)"
  args: "{color, value, max, class}"
  help: progress.md

radial-progress:
  replaces: "div.radial-progress"
  mixin: "+radial-progress(opts)"
  args: "{value, color, size, thickness, class}"
  help: radial-progress.md

loading:
  replaces: "span.loading"
  mixin: "+loading(opts)"
  args: "{variant: spinner|dots|ring|ball|bars|infinity, size, color, class}"
  help: loading.md

skeleton:
  replaces: "div.skeleton"
  mixin: "+skeleton(opts)"
  help: skeleton.md

