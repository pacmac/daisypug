# ============================================================
# Rules
# ============================================================

rules:
  dp-classes: "Every component gets dp-{name} class for API hooks"
  no-hardcoded-colors: "Never use bg-blue-500 etc — use DaisyUI semantic colors"
  child-owns-padding: "Parent never sets child padding — panel body has padding:0"
  no-double-borders: "Tables inside panels have border:none"
  no-body-scroll: "Dashboard pages use h-screen overflow-hidden — panels scroll internally"
  id-tilde: "id: '~' in +dp-fitem auto-generates id from name attribute"
  form-parts: "Same +dp-form id used twice → second becomes data-form-part"
  tab-active: "Never add tab-active class — use checked attribute only"
  autoWidth: "Tables default to autoWidth:true — columns fit content"
