    WANT_DATE: "Customer's requested delivery date."
    SHIPTO_ADDR_1: "Ship-to address line 1."
    SHIPTO_ADDR_2: "Ship-to address line 2."
    SHIPTO_ADDR_3: "Ship-to address line 3."
    NOTES_ID: "Predefined notes template to apply."
    NOTES: "Custom notes for this quotation."
    REV_NOTES: "Description of changes in this revision."

  sales/contact_man:
    CO_ID: "Unique company/contact identifier."
    CO_NAME: "Company or organization name."
    CREATE_DATE: "Date this contact record was created."
    STATUS_ID: "Contact status: Active, Inactive, Prospect, etc."
    STAGE_ID: "Sales pipeline stage: Lead, Qualified, Proposal, Negotiation, etc."
    SOURCE_ID: "How this lead was acquired (referral, web, trade show, etc.)."
    ORDER_MODE: "Preferred ordering method (email, fax, portal, etc.)."
