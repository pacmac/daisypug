    CUST_PO: "Customer's purchase order reference."
    CURRENCY_ID: "Currency for pricing on this order."
    CURRENCY_RATE: "Exchange rate to home currency at time of order."
    GST_ID: "Tax code for this order."
    GST_RATE: "Tax percentage applied to order lines."
    NOTES: "Internal order notes (not printed on documents)."
    REV_NOTES: "Description of changes in the current revision."

  sales/sa_ship:
    SHIPMENT_ID: "Unique shipment identifier."
