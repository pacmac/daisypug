# Field Help — tooltip text for fitem labels
# Lookup order: pages.<module/page>.<FIELD> → <FIELD> (global)

# ── Global field help (applies everywhere) ──────────────────────────────────

# Identity & Status
ACTIVE: "Y = Active, N = Inactive. Inactive records are excluded from lookups."
DESCRIPTION: "Free-text description of this record."
STATUS: "Current processing status of this record."
NOTES: "Free-text notes attached to this record."

# Audit fields
USER_ID: "User who created this record."
CREATE_DATE: "Date and time this record was created."

# Contact fields (used on orders, shipments, quotes, gate passes)
CONTACT_PERSON: "Primary contact name for this transaction."
CONTACT_PHONE: "Contact telephone number."
CONTACT_FAX: "Contact fax number."
CONTACT_EMAIL: "Contact email address."

# Address fields
ADDR_1: "Street address line 1."
ADDR_2: "Street address line 2."
ADDR_3: "City, state/province, postal code."

# Bill-To fields
BILL_TO_PERSON: "Billing contact name."
BILL_TO_PHONE: "Billing contact telephone."
BILL_TO_FAX: "Billing contact fax."
BILL_TO_EMAIL: "Billing contact email."

# COC (Certificate of Conformance) address
COC_ADDR_1: "COC delivery address line 1."
COC_ADDR_2: "COC delivery address line 2."
COC_ADDR_3: "COC delivery address line 3."
COC_EMAIL: "Email address for COC delivery."

# Currency & Tax
CURRENCY_ID: "Transaction currency code."
CURRENCY_RATE: "Exchange rate from transaction currency to home currency."
X_RATE: "Exchange rate from transaction currency to home currency."
GST_ID: "Tax code applied to this transaction."
GST_RATE: "Tax percentage for the selected GST code."

# Inventory common
UOM_ID: "Unit of measure for inventory transactions."
PRODUCT_CODE: "Product grouping code for reporting and costing."
PART_CLASS_ID: "Part classification that controls inventory and production flow."
TRACEABLE: "Lot/serial tracking mode. Cannot be changed after transactions exist."
LOCKED: "Whether this record is locked from adjustments."
BAL_QTY: "Current on-hand inventory balance."

# Dimensions
DIM_TRACKED: "Whether this part tracks physical dimensions (length, width, height)."
DIM_UOM: "Unit of measure for dimension tracking."

# Order common
CUST_PO: "Customer's purchase order reference number."
PAYMENT_TERM: "Agreed payment terms (e.g. Net 30, COD)."
REV_NOTES: "Notes describing changes made in this revision."

# ── Page-specific overrides ─────────────────────────────────────────────────
pages:

  # ── Inventory ─────────────────────────────────────────────────────────────

  inv/sa_parts:
    ID: "Unique part identifier. Max 30 characters, cannot be changed after creation."
    PART_CLASS_ID: "Controls how this part flows through inventory and production."
    ORDER_TYPE: "Replenishment method: Purchase, Manufacture, Subcontract, or Non-Stock."
    TRACEABLE: "Enable lot/serial tracking. Cannot be changed after transactions exist."
    PRODUCT_CODE: "Product grouping code for reporting and costing."
    UOM_ID: "Base unit of measure for all transactions involving this part."
    PART_REV_NO: "Current engineering revision level."
    ECN_ID: "Engineering Change Notice that authorized the current revision."
    ALIAS_DESC: "Alternate name, cross-reference, or customer part number."
    UNIT_MATERIAL_COST: "Standard material cost per unit. Used in BOM cost rollups."
    UNIT_CONSUMABLE_COST: "Cost of consumable materials per unit (tooling, packaging, etc.)."
    BAL_QTY: "Current on-hand inventory balance across all locations."
    SAFETY_STOCK_QTY: "Minimum stock level. Triggers reorder alert when balance falls below."
    DIM_TRACKED: "Enable piece-level dimension tracking (length, width, height per piece)."
    DIM_UOM: "Unit of measure for dimension values (mm, cm, inch, etc.)."
    DIM_PC_TOTAL: "Total number of discrete pieces in stock."
    LENGTH: "Available length values for this part."
    WIDTH: "Available width values for this part."
    HEIGHT: "Available height values for this part."
    LOCKED: "Locks part from physical count adjustments during counting."
    LAST_COUNT_DATE: "Date of the most recent physical inventory count."
    CYCLE_COUNT: "Days between scheduled physical inventory counts."
    LOT_SIZE: "Maximum number of units per lot for traceability."
    UDF_LAYOUT_ID: "User-defined fields layout template for additional custom data."

  inv/part_trans:
    PART_ID: "Part being transacted. Select from active parts."
    TRANSACTION_DATE: "Date this transaction takes effect in inventory."
    PART_DESC: "Description of the selected part (read-only)."
    PART_UOM: "Unit of measure of the selected part (read-only)."
    TRACEABLE: "Trace mode of selected part: None, Lot, or Serial."
    DIM_TRACKED: "Whether selected part uses piece-level dimension tracking."
    LOCKED: "Shows if this part's inventory is locked for counting."
    AVAIL_BAL: "Available quantity before this transaction."
    QTY: "Number of units to transact. Positive = in, negative = out."
    UNIT_MATERIAL_COST: "Cost per unit for this transaction."
    DOCUMENT_ID: "Reference document (PO, SO, job number, etc.)."
    NOTES: "Transaction notes and comments."
    WOREF: "Work order / job reference for production transactions."
    BASE_ID: "Master assembly part ID (for BOM-related transactions)."
    SUB_ID: "Sub-assembly part ID within the master BOM."
    SEQ_ID: "BOM sequence number for the component."
    QTY_REQ: "Quantity required and received for this BOM line."
    JOB_COST: "Accumulated job cost for this component."
    TRACE_ID: "Lot or serial number for traceable transactions."
    TRACE_MATERIAL_COST: "Material cost specific to this lot/serial."
    EXPIRY_DATE: "Expiry date for this lot (if applicable)."
    LOT_SIZE: "Maximum units allowed in this lot."
    BAL_QTY: "Current balance of this specific lot."
    DIM_LWH: "Select from available dimension combinations."
    DIM_LENGTH: "Length of pieces being transacted."
    DIM_WIDTH: "Width of pieces being transacted."
    DIM_HEIGHT: "Height of pieces being transacted."
    DIM_PC_AVAIL: "Available pieces matching selected dimensions."
    DIM_PC_QTY: "Number of pieces to transact."

  inv/physical_count:
    PHYSICAL_COUNT_ID: "Select or create a physical count session."
    START_DATE: "Date counting begins. Locks affected inventory."
    INVENTORY_LOCK: "Scope of inventory lock during count (All, Cycle, None)."
    CYCLE_COUNT: "Count cycle filter (e.g. parts due for counting)."
    END_DATE: "Date counting was completed."
    END_COUNT_USER: "User who finalized the count."
    PART_ID: "Filter counts by specific part."
    PRODUCT_CODE: "Filter counts by product code."
    TRACEABLE: "Filter by trace mode (None, Lot, Serial)."
    DIM_TRACKED: "Filter by dimension tracking status."
    PART_CLASS_ID: "Filter by part class."
    NOTES: "Notes about this physical count session."

  inv/inv_gpass:
    GP_ID: "Unique gate pass identifier."
    GP_TYPE: "Gate pass type: Customer or Vendor."
    GP_TYPE_ID: "Customer or Vendor ID depending on gate pass type."
    NAME: "Customer or vendor company name."
    GP_DATE: "Transaction date for this gate pass."
    TX_TYPE: "Transaction type: Incoming or Outgoing."
    NOTES: "Gate pass notes and remarks."

  inv/tool_request:
    OPERATOR_ID: "Employee requesting tools from the tool crib."
    OPERATOR_NAME: "Name of the requesting operator."
    PART_ID: "Tool or consumable part being requested."
    QTY: "Number of units being issued or returned."
    PART_DESC: "Description of the requested tool/part."

  # ── Sales ──────────────────────────────────────────────────────────────────

  sales/sa_sorder:
    ID: "Unique sales order number."
    STATUS: "Order status: Open, Confirmed, Closed, Cancelled."
    REV_NO: "Revision number. Increments each time the order is revised."
