    CUST_PO: "Customer PO number from the sales order."
    INVOICE_ID: "Invoice number generated for this shipment."
    INVOICE_NOTES: "Notes printed on the invoice document."
    SHIPMENT_SPEC: "Packing instructions and special handling notes."
    ORDER_NOTES: "Order-level notes carried from the sales order."
    REV_NOTES: "Revision notes from the sales order."
    CURRENCY_ID: "Transaction currency for this shipment."
    X_RATE: "Exchange rate at time of shipment."
    GST_ID: "Tax code applied to this shipment."
    GST_RATE: "Tax percentage for the shipment."
    CUR_SUBT_AMOUNT: "Pre-tax total in transaction currency."
    CUR_GST_AMOUNT: "Tax amount in transaction currency."
    CUR_TOTAL_AMOUNT: "Grand total in transaction currency."
    SUBT_AMOUNT: "Pre-tax total in home currency."
    GST_AMOUNT: "Tax amount in home currency."
    TOTAL_AMOUNT: "Grand total in home currency."

  sales/quote_man:
    QUOTE_ID: "Unique quotation identifier."
    QUOTE_FORMAT: "Document template used when printing this quote."
    DESCRIPTION: "Quote title or subject line."
    STATUS: "Quote status: Draft, Submitted, Won, Lost, Expired."
    REVISION: "Revision number. Increments when quote is re-issued."
    CUSTOMER_ID: "Customer this quote is prepared for."
    CUSTOMER_NAME: "Customer company name (auto-filled)."
    CURRENCY_ID: "Currency for all pricing on this quote."
    PAYMENT_TERM: "Payment terms offered to the customer."
