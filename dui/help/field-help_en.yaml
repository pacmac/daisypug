    WEBSITE: "Company website URL."
    PRIMARY_CONTACT_ID: "Primary contact person at this company."
    POSTCODE: "Postal or ZIP code."
    COUNTRY: "Country name or code."
    LAST_EVENT_ID: "Most recent CRM event ID."
    LAST_EVENT_NAME: "Name of the most recent CRM event."
    LAST_EVENT_DATE: "Date of the most recent CRM event."

