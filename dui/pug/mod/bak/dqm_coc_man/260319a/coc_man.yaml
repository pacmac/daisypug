# coc_man — Certificate of Conformance Manager
# Generated by dui-migrate Phase 0

page_id: dqm^coc_man
module: dqm
page: coc_man
title: Certificate of Conformance Manager

eui_source:
  pug: html/eui/dqm/coc_man.pug
  js: html/eui/dqm/js/coc_man.js
  lines_pug: 160
  lines_js: 588

eui_baseline:
  layout:
    type: vsplit
    split_size: 400px
    regions: [west, center]
    nested:
      center:
        type: tabs
        tabs: [Details, Remarks, Address, User Fields, Boiler Plates, Attachments]
      details_tab:
        type: hsplit
        regions: [north, center]
        north: form fields (QTY, ISSUED_BY, etc)
        center: multiline DESCRIPTION

  load_elements:
    - type: combobox
      id: COC_ID
      _sqlid: dqm^cocs
      grouped_by: STATUS
      autonum: true
      fkey: true

  form:
    id: coc
    _sqlid: dqm^coc
    asdpx: xa
    mode: add
    classes: [multi, fit, changeonly]

  fields:
    west:
      - {name: COC_ID, type: combobox, _sqlid: "dqm^cocs", fkey: true, autonum: true, grouped: STATUS}
      - {name: STATUS, type: textbox, readonly: true, sub-on: true}
      - {name: PRINTED, type: datebox, readonly: true}
      - {name: VOID_REASON, type: textbox, hidden: true, sub-on: true}
      # Job Summary fieldset
      - {name: WOREF, type: combobox, navi: true, required: true, grouped: WO_CLASS}
      - {name: WO_CLASS, type: textbox, readonly: true, sub-off: true}
      - {name: WO_STATUS, type: textbox, readonly: true, sub-off: true}
      - {name: WO_WANT_DATE, type: datebox, readonly: true, sub-off: true}
      - {name: WO_QTY, type: numberbox, readonly: true, sub-off: true, precision: 2}
      - {name: COC_QTY, type: numberbox, readonly: true, sub-off: true, precision: 2, hidden_parent: true}
      - {name: WO_QTY_BAL, type: numberbox, readonly: true, sub-off: true, precision: 2, hidden_parent: true}
      # Sales Order fieldset
      - {name: CUSTOMER_ID, type: textbox, readonly: true}
      - {name: SALES_ORDER_ID, type: textbox, readonly: true}
      - {name: SALES_ORDER_LINE_NO, type: textbox, readonly: true}
      - {name: SOL_QTY, type: textbox, readonly: true, sub-off: true}
      - {name: SHIPMENT_ID, type: textbox, readonly: true, sub-off: true}
      - {name: SOL_SHP_QTY, type: textbox, readonly: true, sub-off: true}
      - {name: SHIPPED, type: textbox, readonly: true, sub-off: true}
      # CP fieldset
      - {name: CP_REF, type: textbox, readonly: true, sub-off: true}

    details_tab:
      - {name: QTY, type: numberspinner, value: 0}
      - {name: ISSUED_BY, type: combobox, required: true, readonly: true}
      - {name: ISSUED_USER, id: ISSUED_BY_USER, type: textbox, readonly: true}
      - {name: ISSUED_BY_POSITION, type: textbox, readonly: true}
      - {name: ISSUED_BY_EMAIL, type: textbox, readonly: true}
      - {name: DESCRIPTION, id: WO_LONG_SPEC, type: multiline, prompt: "Job Specifications"}

    remarks_tab:
      - {name: REMARKS, type: multiline, prompt: "Remarks"}

    address_tab:
      - {name: NAME, type: textbox, validType: "length[1,80]"}
      - {name: ADDR_1, type: textbox, validType: "length[1,50]"}
      - {name: ADDR_2, type: textbox, validType: "length[1,50]"}
      - {name: ADDR_3, type: textbox, validType: "length[1,50]"}
      - {name: CONTACT_PERSON, type: textbox, validType: "length[1,80]"}
      - {name: CONTACT_PHONE, type: textbox, validType: "length[1,20]"}
      - {name: CONTACT_FAX, type: textbox, validType: "length[1,20]"}
      - {name: CONTACT_EMAIL, type: textbox, validType: "email,length[5,80]"}

    user_fields_tab:
      - {name: USER_1, type: textbox, label_id: ulabel_1}
      - {name: USER_2, type: textbox, label_id: ulabel_2}
      - {name: USER_3, type: textbox, label_id: ulabel_3}
      - {name: USER_4, type: textbox, label_id: ulabel_4}
      - {name: USER_5, type: textbox, label_id: ulabel_5}

    boiler_plates_tab:
      - {name: BOILER_IDS, type: hidden}
      - {name: BOILER_SPECS, type: hidden}
      # #cocspec datagrid here

  datagrids:
    - id: cocspec
      url: "/?_func=get&_sqlid=dqm^coc_bspecs"
      type: checkbox
      columns: [_CK, TYPE, DEFAULT_VAL, ID, REV, DESCRIPTION]
      formatters: [TYPE formatter, DEFAULT_VAL formatter]
      callbacks: [onBeforeSelect, onCheck, onUncheck]

  icons_needing_fix:
    - aicon-address -> icon-address (Address tab)
    - aicon-list -> icon-list (User Fields tab)
    - aicon-page_red -> icon-pagered (Boiler Plates tab)

  js_functions:
    - {name: onBeforePrint, type: callback, desc: "Print validation + status update"}
    - {name: pstat, type: helper, desc: "Status color coding"}
    - {name: cocqty, type: helper, desc: "Calculate COC qty balance"}
    - {name: uid, type: helper, desc: "Load ISSUED_BY combo data"}
    - {name: dgoncheck, type: callback, desc: "Datagrid check/uncheck handler"}
    - {name: dgonload, type: helper, desc: "Load datagrid with pre-checked rows"}
    - {name: opn_material, type: helper, desc: "Get open material balance"}
    - {name: woselect, type: handler, desc: "WO selection + data load logic"}
    - {name: clonedel, type: helper, desc: "Clone field deletion"}
    - {name: worload, type: helper, desc: "Reload WOREF combo"}
    - {name: dovoid, type: handler, desc: "Void status toggle"}

  toolbar_buttons:
    - {id: print_coc, text: "Print COC", icon: icon-form}

  notes: |
    Complex page: COC form with WO lookup, boiler plate datagrid with checkboxes,
    multi-tab layout, print workflow with status management.
    Clone/add menu is commented out in EUI source — skip for DUI.
    #cifiles filegrid in Attachments tab.
    Status combo with filtertip on COC_ID.
    ISSUED_BY loaded via ajax call to dqm^uidall.

