name: combobox
dui:
  plugin: combobox-plugin.js
  methods:
    - getValue
    - setValue
    - getValues
    - setValues
    - getText
    - setText
    - getData
    - getRec
    - loadData
    - reload
    - clear
    - reset
    - select
    - unselect
    - exists
    - find
    - sort
    - enable
    - disable
    - readonly
    - editbox
    - toText
    - toCombo
    - formLoad
    - required
    - filtertip
    - textbox
    - destroy
    - options
  callbacks:
    - onBeforeLoad
    - onLoadSuccess
    - onLoadError
    - onSelect
    - onUnselect
  options:
    - valueField
    - textField
    - separator
    - groupField
    - groupFormatter
    - mode (local/remote)
    - method
    - url
    - data
    - queryParams
    - loadFilter
    - disabled
    - readonly
    - editable
    - keyHandler
    - filter
    - formatter
    - loader
    - autoload
    - _sqlid

dp:
  class: DpCombobox (extends DpSelect)
  status: partial
  done:
    - getValue / setValue (inherited + autoload queue)
    - getText (alias getSelectedText)
    - enable / disable / show / hide (inherited)
    - loadData (populate from array via template cloning)
    - load (fetch from URL then loadData)
    - reload (re-fetch from configured URL)
    - getData (return stored data rows)
    - getRec (full row for selected value, string comparison)
    - exists (check if value in data)
    - config (valueField, textField, url, queryParams, loadFilter)
    - onSelect (callback with {value, text, rec, index})
    - onLoadSuccess / onLoadError events
    - loadFilter (transform response before storing)
    - valueField / textField mapping with fallback chain
    - Editor modal integration (dp-combobox class, onBeforeRender)
    - Placeholder preservation on loadData
    - autoload (queue setValue for after next loadData)
  todo:
    - Debounced type-to-filter (remote mode)
    - Local data filtering
    - Edit modal (add/edit options inline)
    - Name/hidden input dance (display vs stored value)
    - groupField grouping
    - formatter (custom option rendering)
    - Keyboard navigation (up/down/enter)
    - fkey cascading integration
    - sort (sort data by field)
    - Multi-select (getValues/setValues)

notes: |
  DpCombobox extends DpSelect with internal data store (_cbData).
  Uses template cloning + DocumentFragment for option rendering.
  Remote loading via dp.get() / _fetch().
  onSelect bridges native change event to dp:select with full row data.
  Editor modal combobox fields get dp-combobox class and onBeforeRender
  callback for dynamic population at open time (async supported).
  Registered as 'combobox' in REGISTRY (dp-combobox class).
