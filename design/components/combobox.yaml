name: combobox
dui:
  plugin: combobox-plugin.js
  methods:
    - getValue
    - setValue
    - getValues
    - setValues
    - getText
    - setText
    - getData
    - getRec
    - loadData
    - reload
    - clear
    - reset
    - select
    - unselect
    - exists
    - find
    - sort
    - enable
    - disable
    - readonly
    - editbox
    - toText
    - toCombo
    - formLoad
    - required
    - filtertip
    - textbox
    - destroy
    - options
  callbacks:
    - onBeforeLoad
    - onLoadSuccess
    - onLoadError
    - onSelect
    - onUnselect
  options:
    - valueField
    - textField
    - separator
    - groupField
    - groupFormatter
    - mode (local/remote)
    - method
    - url
    - data
    - queryParams
    - loadFilter
    - disabled
    - readonly
    - editable
    - keyHandler
    - filter
    - formatter
    - loader
    - autoload
    - _sqlid

dp:
  class: DpCombobox (extends DpComponent)
  status: implemented
  shell: div.dp-combobox > input.dp-cb-display + div.dp-cb-selected + input[hidden] + button.dp-cb-toggle + ul.dp-cb-dropdown
  done:
    - Custom dropdown shell (no native select)
    - getValue / setValue (hidden input + display text sync)
    - getText / setText (display input)
    - getName / setName (hidden input name)
    - enable / disable / show / hide (inherited)
    - focus / blur (display input)
    - isReadOnly / setReadOnly
    - getPlaceholder / setPlaceholder
    - isRequired / setRequired
    - open / close / toggleDropdown / isOpen
    - loadData (populate from array via template cloning)
    - load (fetch from URL then loadData)
    - reload (re-fetch from configured URL)
    - getData (return stored data rows)
    - getRec (full row for selected value, string comparison)
    - exists (check if value in data)
    - config (valueField, textField, url, queryParams, loadFilter, editable, formatter, mode, delay, pageSize, filter)
    - onSelect (callback with {value, text, rec})
    - onLoadSuccess / onLoadError events
    - loadFilter (transform response before storing)
    - valueField / textField mapping with fallback chain
    - autoload (queue setValue for after next loadData)
    - Type-to-search (local filter on keystroke)
    - Remote search (debounced server query, mode:'remote')
    - Custom filter function (config filter option)
    - Lazy scroll loading (IntersectionObserver, configurable pageSize)
    - Keyboard navigation (ArrowUp/Down, Enter, Escape, Tab)
    - Formatter (custom dropdown option rendering via config formatter)
    - displayFormatter (custom selected display with rich DOM content)
    - Editor modal integration (div structure, onBeforeRender)
    - dp-fitem pug mixin renders div structure natively
    - Select upgrade (_upgradeFromSelect for backward compat)
    - Scroll active item into view on open
    - Modal overflow fix (dropdown visible inside dialogs)
    - DpForm getData/setData/reset recognizes .dp-combobox
  priority:
    - sort (sort data by field)
    - fkey cascading integration (combo change triggers form load)
  todo:
    - groupField grouping
    - Multi-select (getValues/setValues)
    - Edit modal (add/edit options inline)
    - Recents (localStorage via dp.remember)

notes: |
  DpCombobox extends DpComponent directly (not DpSelect).
  Custom dropdown: div wrapper with display input, hidden input, toggle button, dropdown panel.
  Uses template cloning + DocumentFragment for option rendering with lazy batching.
  Type-to-search: local filter (case-insensitive substring) or remote (debounced fetch).
  Keyboard: ArrowUp/Down moves highlight, Enter selects, Escape closes, Tab closes.
  Editor modal creates div structure; _upgradeFromSelect handles legacy <select> elements.
  Registered as 'combobox' in REGISTRY (dp-combobox class).
  CSS: dp.css handles shell layout, dropdown positioning, active/highlight/hover states,
  modal overflow fix via :has(.dp-cb-open).
