notes: |
  DUI tree uses DaisyUI <ul> with <details>/<summary> for expand/collapse.
  Node data stored in $.data(li, 'tree-node').
  Icons resolved via $.dui.icon() → Lucide.
  Used for sidebar navigation menus.
