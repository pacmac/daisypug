name: datagrid
dui:
  plugin: datagrid-plugin.js
  methods:
    - reload
    - load
    - loadData
    - getData
    - getRows
    - getSelected
    - getSelections
    - clearSelections
    - selectRow
    - unselectRow
    - selectRecord
    - appendRow
    - updateRow
    - deleteRow
    - showColumn
    - hideColumn
    - columns
    - fitColumns
    - renderColumns
    - rowEditor
    - editButs
    - editDone
    - findRows
    - hideRow
    - showRow
    - showRows
    - resizeColumn
    - toExcel
    - readonly
    - options
    - sort
  callbacks:
    - onBeforeLoad
    - onLoadSuccess
    - onBeforeSelect
    - onSelect
    - onBeforeUnselect
    - onUnselect
    - onClickRow
    - onClickCell
    - onDblClickRow
    - onDblClickCell
    - onRowContextMenu
    - onEndEdit
    - onDeleteRow
    - onValidateRow
  options:
    - url
    - method
    - singleSelect
    - fitColumns
    - striped
    - rownumbers
    - pagination
    - idField
    - queryParams
    - loadFilter
    - addData
    - saveSqlId
    - data
    - asdpx
    - toolbar
  column_properties:
    - field
    - title
    - width
    - hidden
    - align
    - formatter
    - styler
    - editor
    - coloff
    - fixed
  editor_system:
    column_editor_types:
      - textbox
      - combobox (static data or remote _sqlid)
      - numberbox (precision, min, max)
      - numberspinner
      - datebox
      - searchbox (sbref)
      - textarea / multiline
    editor_options:
      - type (editor type name)
      - options.readonly
      - options.required
      - options.precision
      - options.min / max
      - options.data (static combobox items)
      - options._sqlid (remote combobox data)
      - options.editable (combobox typing)
      - options.sbref (searchbox definition)
    modal_convention:
      id: "${gridId}_editor"
      auto_generated: true (Pug mixin renders when any column has editor)
      titlebar: "primary color, square-pen icon, 'Edit Row' title"
      structure: "titlebar → form fields (one per editor column) → Save button"
      hidden_columns: "columns with hidden:true and no editor become <input type=hidden>"
    triggers:
      - Add button (${gridId}_add) — clears form, applies addData defaults
      - Edit button (${gridId}_edit) — fills with selectedRow
      - Double-click row — same as edit (unless onDblClickRow returns false)
    save_flow:
      - collectEditorData() extracts form → {field: value} object
      - onValidateRow(index, row, formData) — return error string to cancel
      - Path A (onEndEdit): page handles POST, row._func = 'add'|'upd'
      - Path B (saveSqlId): plugin auto-POSTs with _sqlid and _func
      - Updates grid DOM (appendRow or updateRow)
      - Closes modal
    addData_patterns:
      - static value: "QUANTITY": 1
      - from form field: "STATUS": "#defaultStatus"
      - auto-increment: "LINE_NO": "$autonum:10"

dp:
  class: DpDataTable
  status: partial
  done:
    - columns
    - setData
    - getData
    - getRows
    - getRow
    - addRow
    - removeRow
    - updateRow
    - getCell
    - setCell
    - selectRow
    - deselectRow
    - selectRecord
    - getSelectedRow
    - getSelectedIndex
    - showColumn
    - hideColumn
    - idField
    - rowStyler
    - sort
    - filter
    - clearFilter
    - search
    - clearSearch
    - toCSV
    - toJSON
    - groupBy
    - groupByCol
    - paginate
    - nextPage
    - prevPage
    - setPage
    - firstPage
    - lastPage
    - getPage
    - getPageCount
    - getPageSize
    - setPageSize
    - getTotalRows
    - loadData
    - onRowClick
    - onRowDblClick
    - onRowSelect
    - onCellClick
    - onSort
    - onDataChange
    - onPageChange
    - template cloning for row rendering
    - inline pagination footer
    - full-height flex layout with scroll
    - font-size inheritance
    - column.editor (type + options on column definition)
    - rowEditor() — auto-build modal from column editors
    - editRow(n) / addNewRow() — open editor in edit/add mode
    - populateEditor / collectEditor (fill/extract modal fields)
    - saveEditor — validate → onEndEdit callback → update grid → close
    - onEndEdit callback ({mode, index, row, formData})
    - onValidateRow callback (return error string to cancel)
    - onDeleteRow callback (with confirm, removes from grid)
    - Delete button in modal footer (auto-added when onDeleteRow provided)
    - addData defaults for new rows
    - .editable class with cursor:pointer and hover highlight
    - Edit icon in spacer column (pencil, right-aligned, touch-friendly)
    - onBeforeRender on column.editor (async support for dynamic combobox)
    - Modal focus first editable input on open
    - Modal close button focus ring suppressed
  priority:
    - reload (server re-fetch with params)
    - loadFilter (transform response before rendering)
    - rownumbers (row number column)
    - hideRow / showRow (toggle row visibility)
    - asdpx toolbar integration (add/edit/delete buttons wired to editor)
  todo:
    - addData $autonum and #fieldRef patterns
    - saveSqlId (auto-POST on save)
    - fitColumns (auto-stretch to fill width)
    - findRows (search rows by criteria object)
    - resizeColumn (resize by field)
    - toExcel (export to xlsx)
    - readonly (lock table)
    - onBeforeLoad
    - onBeforeSelect (return false to cancel)
    - onBeforeUnselect
    - onUnselect
    - onRowContextMenu
    - getSelections (multi-select)
    - clearSelections
  skip:
    - EUI shims (getPanel, getPager, freezeRow, checkRow, etc.)
    - pagination option (use paginate() method instead)

notes: |
  Column formatters accept functions directly, not string refs like DUI.
  Template cloning used for row rendering (not innerHTML).
  DUI uses column.styler; DP uses column.style and column.cellClass (functions or strings).

  Editor modal design for DP:
  - column.editor = { type, ...options } on column definitions
  - table.rowEditor() auto-builds a <dialog> modal using template cloning
  - Each editor column becomes a dp-fitem field (auto-detect type from editor.type)
  - Hidden columns without editors become hidden inputs
  - populateEditor fills fields from row object by field name
  - collectEditor extracts field values back to object
  - Save flow: validate → onEndEdit callback (or auto-POST) → updateRow/addRow → close
  - Add button clears form and applies addData defaults
  - Edit button / double-click fills form with selected row
  - Delete button fires onDeleteRow with confirmation
  - _func field injected as 'add'|'upd'|'del' for server routing
