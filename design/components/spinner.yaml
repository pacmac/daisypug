name: spinner
dui:
  plugin: spinner-plugin.js
  methods:
    - getValue
    - setValue
    - clear
    - reset
    - enable
    - disable
    - readonly
    - isValid
    - validate
    - spinUp
    - spinDown
    - resize
    - textbox
    - destroy
    - setValidType
    - options
  callbacks:
    - onSpinUp
    - onSpinDown
  options:
    - step
    - min
    - max
    - precision

dp:
  class: null
  status: todo
  done: []
  todo:
